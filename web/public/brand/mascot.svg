<svg width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SolisMarket">
  <defs>
    <radialGradient id="sm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD873" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#F5B301" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#F5B301" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sm-sun" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#FFE49A"/>
      <stop offset="55%" stop-color="#F5B301"/>
      <stop offset="100%" stop-color="#E08A00"/>
    </radialGradient>
  </defs>

  <!-- ambient solar glow -->
  <circle cx="210" cy="206" r="200" fill="url(#sm-glow)"/>

  <!-- orbit ring (tilted) -->
  <ellipse cx="210" cy="210" rx="152" ry="80" transform="rotate(-22 210 210)" stroke="#F5B301" stroke-width="6" opacity="0.85"/>
  <ellipse cx="210" cy="210" rx="152" ry="80" transform="rotate(-22 210 210)" stroke="#FFD873" stroke-width="2" opacity="0.5"/>

  <!-- the sun -->
  <circle cx="210" cy="210" r="60" fill="url(#sm-sun)"/>
  <circle cx="210" cy="210" r="60" fill="none" stroke="#FFE49A" stroke-width="1.5" opacity="0.6"/>

  <!-- orbiting body, top-right of the ring -->
  <circle cx="322" cy="150" r="15" fill="#FFD873"/>
  <circle cx="322" cy="150" r="15" fill="none" stroke="#F5B301" stroke-width="2"/>
</svg>
